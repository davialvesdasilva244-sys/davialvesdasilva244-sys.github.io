<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>CSS</title>
        <link rel="stylesheet" href="css05.css">
    </head>
    <body>
     <p>Texto Formatado com CSS</p>
          <P>Ola Turma!</P>
        <p>Exemplo de Paragrafo</p>
        <b>Texto em Negrito</b><br>
         <i>Texto em Italico</i><br>
         <u>Texto com Sublinhado</u>
         <hr>
         <b>Lista Não Ordenada</b><br>
         <ul>
            <li style="color: darkblue;">Item 1</li>
            <li>Item 2</li> 
            <li>Item 3</li> 
         </ul>
         <br>
         <b>Lista Ordenada</b><br>
         <ol>
            <li class="primeiro_item">Item 1</li>
            <li>Item 2</li>
            <li id="ultimo_item">Item 3</li>
         </ol>
        </body>

</html>
